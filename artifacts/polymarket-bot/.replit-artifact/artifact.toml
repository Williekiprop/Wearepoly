kind = "web"
previewPath = "/"
title = "Polymarket BTC Trading Bot"
version = "1.0.0"
id = "artifacts/polymarket-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20530
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/polymarket-bot run dev"

[services.env]
PORT = "20530"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/polymarket-bot", "run", "build"]
publicDir = "artifacts/polymarket-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
